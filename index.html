<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu GitHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background-color: #f0f0f0;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .nome {
            color: #2c3e50;
            font-size: 1.5em;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .link-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            width: 250px;
            transition: background-color 0.3s;
        }
        
        .link-button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao meu GitHub</h1>
    
    <div class="nome">
        <!-- Substitua "Seu Nome" pelo seu nome real -->
        <strong>Seu Nome</strong>
    </div>
    
    <div class="links">
        <!-- Link 1: Seu perfil do GitHub -->
        <a href="https://github.com/seu-usuario" class="link-button" target="_blank">
            Meu GitHub
        </a>
        
        <!-- Link 2: LinkedIn (se tiver) -->
        <a href="https://linkedin.com/in/seu-perfil" class="link-button" target="_blank">
            LinkedIn
        </a>
        
        <!-- Link 3: Seu portfólio ou outro projeto -->
        <a href="#" class="link-button" target="_blank">
            Meu Portfólio
        </a>
    </div>
</body>
</html>
